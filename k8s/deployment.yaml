apiVersion: apps/v1
kind: Deployment
metadata:
  name: flipflop-service
  namespace: statex-apps
  labels:
    app: flipflop-service
    component: api-gateway
    managed-by: k8s-migration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flipflop-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: flipflop-service
        component: api-gateway
        managed-by: k8s-migration
    spec:
      containers:
        - name: api-gateway
          image: localhost:5000/flipflop-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: flipflop-config
            - secretRef:
                name: flipflop-service-secret
          env:
            - name: PORT
              value: "3000"
            - name: SERVICE_NAME
              value: "flipflop-api-gateway"
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flipflop-frontend
  namespace: statex-apps
  labels:
    app: flipflop-frontend
    component: frontend
    managed-by: k8s-migration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flipflop-frontend
      component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: flipflop-frontend
        component: frontend
        managed-by: k8s-migration
    spec:
      containers:
        - name: frontend
          image: localhost:5000/flipflop-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: flipflop-config
          env:
            - name: PORT
              value: "3000"
            - name: SERVICE_NAME
              value: "flipflop-frontend"
            - name: API_URL
              value: "http://flipflop-service:3000/api"
            - name: NEXT_PUBLIC_API_URL
              value: "https://flipflop.alfares.cz/api"
          startupProbe:
            httpGet:
              path: /
              port: 3000
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              memory: "192Mi"
              cpu: "50m"
            limits:
              memory: "768Mi"
              cpu: "500m"
---
